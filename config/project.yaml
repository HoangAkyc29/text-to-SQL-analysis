app_name: supermarket-analysis-agent

pipeline:
  max_sql_queries_per_plan: 6
  max_sql_retries: 3
  max_risk_retries: 2
  max_clarify_rounds: 3
  max_sync_seconds: 120
  iv_max_steps: 8
  poll_enabled: true
  workflow_stale_ttl_seconds: 900
  workflow_steps_max: 200
  workflow_steps_scope: analysis

clarification:
  hard_enforce: true
  bridge_min_confidence: 0.75

rag:
  clarify_min_score: 0.72
  top_k: 5

budget:
  agent_caps:
    I: 5
    II: 6
    III: 18
    IV: 4
  max_tokens_per_trace: 200000

policy:
  max_rows: 50000
  max_join_depth: 5
  default_schema: dbo

artifacts:
  base_dir: data/artifacts
  ttl_days: 7
  max_bytes_per_trace: 52428800

stm:
  session_ttl_days: 30

data_sources:
  db1:
    env_dsn: ANALYTICS_DB_DSN
  db2:
    env_dsn: ANALYTICS_DB_DSN_2

# Logical table names from data_dictionary. SQL may also use db1 shards STRANS_YYYYMM, PMTRANS_YYYYMM.

_HQ_TABLES: &hq_tables
  - STRANS
  - PMTRANS
  - TRANSHDR
  - TRANSHDR_ARC
  - CRDTRANS
  - CRDTRANS_ARC
  - CRDTRANS_TMP
  - STRANS_TMP
  - SUSPEND
  - CASH_ST
  - CTRANS
  - CUSTOMER
  - CSCARD
  - CRD_INFO
  - CUSTHIST
  - CustSumm
  - SKU_DEF
  - PLU
  - BARCODE
  - ASSOLST
  - ASSO_INF
  - SUPPLIER
  - PARTNER
  - HISRTPR
  - HISSPPR
  - RDISCINF
  - STK_DTL
  - ST_ORDER
  - INV_HDR
  - INV_ISS
  - PMCRDINF
  - PMCRDSTK
  - PMCRDISS
  - PMCRDRCV
  - ACCOUNT
  - DEBT
  - sku_activity
  - WebRpt_sales_sku_daily
  - WebRpt_inventory_daily
  - WebRpt_rfm_snapshot

_STORE_TABLES: &store_tables
  - STRANS
  - PMTRANS
  - TRANSHDR
  - CRDTRANS
  - CUSTOMER
  - CSCARD
  - CustSumm
  - CUSTHIST
  - SKU_DEF
  - BARCODE
  - PLU
  - SUPPLIER
  - WebRpt_sales_sku_daily
  - WebRpt_inventory_daily
  - WebRpt_rfm_snapshot

roles:
  store_manager:
    allowed_tables: *store_tables
    denied_columns:
      - SPPRICE
      - LASTSPPR
      - cogs
      - gross_profit
      - free_cogs
      - value_onhand
      - PASSCODE
      - PERSON_ID
    store_filter_required: true
  hq_analyst:
    allowed_tables: *hq_tables
    denied_columns: []
    store_filter_required: false
