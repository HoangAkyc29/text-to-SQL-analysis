services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  mongodb:
    image: mongo:7
    ports: ["27017:27017"]

  sql-gateway:
    build:
      context: .
      dockerfile: mcp-servers/sql-gateway/Dockerfile
    environment:
      - ANALYTICS_DB_DSN=${ANALYTICS_DB_DSN}
      - ANALYTICS_DB_DSN_2=${ANALYTICS_DB_DSN_2}
    ports: ["8101:8101"]

  conversational-router:
    build:
      context: .
      dockerfile: agents/conversational-router/Dockerfile
    environment:
      - AGENT_HTTP_PORT=8201
      - ALLOW_LLM_STUB=1
    ports: ["8201:8201"]

  sql-planner:
    build:
      context: .
      dockerfile: agents/sql-planner/Dockerfile
    environment:
      - AGENT_HTTP_PORT=8202
      - ALLOW_LLM_STUB=1
    ports: ["8202:8202"]

  risk-reviewer:
    build:
      context: .
      dockerfile: agents/risk-reviewer/Dockerfile
    environment:
      - AGENT_HTTP_PORT=8203
      - ALLOW_LLM_STUB=1
    ports: ["8203:8203"]

  data-analyst:
    build:
      context: .
      dockerfile: agents/data-analyst/Dockerfile
    environment:
      - AGENT_HTTP_PORT=8204
      - ALLOW_LLM_STUB=1
    ports: ["8204:8204"]

  chat-gateway:
    build:
      context: .
      dockerfile: agents/chat-gateway/Dockerfile
    environment:
      - CHAT_GATEWAY_PORT=8300
      - REDIS_URL=redis://redis:6379/0
      - MONGODB_URI=mongodb://mongodb:27017/supermarket_agent
      - ALLOW_DEV_AUTH=1
      - ALLOW_LLM_STUB=1
      - SQL_GATEWAY_INPROCESS=1
    ports: ["8300:8300"]
    depends_on: [redis, mongodb, sql-planner, risk-reviewer, data-analyst, conversational-router]
