[project]
name = "project-core"
version = "0.1.0"
description = "Shared project domain logic for multi-agent projects (scaffold)"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "agent-core",
    "commons",
    "pydantic>=2",
    "pyyaml",
    "pandas",
    "numpy",
    "matplotlib",
    "requests",
    "python-dotenv",
    "strands-agents>=0.1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/project_core"]

[tool.hatch.metadata]
allow-direct-references = true

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
