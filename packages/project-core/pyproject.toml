[project]
name = "project-core"
version = "0.1.0"
description = "Supermarket analysis multi-agent domain logic"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "agent-core",
    "commons",
    "pydantic>=2",
    "pyyaml",
    "pandas",
    "numpy",
    "matplotlib",
    "requests",
    "python-dotenv",
    "strands-agents>=0.1.0",
    "sqlglot>=25",
    "pymongo>=4.6",
    "pyodbc>=5.1",
    "openpyxl>=3.1",
    "structlog>=24",
    "tenacity>=8.2",
    "redis>=5.0",
    "httpx>=0.27",
    "platform-core",
    "pyarrow>=15",
    "pypdf>=4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/project_core"]

[tool.hatch.metadata]
allow-direct-references = true

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
