[project]
name = "project-test"
version = "0.1.0"
description = "Integrated test suite for base multi-agent monorepo scaffold"
requires-python = ">=3.11"
dependencies = [
    "project-core",
    "platform-core",
    "base-runner",
    "base-agent",
    "base-mcp-server",
    "pytest>=8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/project_test"]

[tool.pytest.ini_options]
testpaths = ["."]
pythonpath = ["."]
addopts = "-q"
