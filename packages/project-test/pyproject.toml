[project]
name = "project-test"
version = "0.1.0"
description = "Integrated test suite for base multi-agent monorepo scaffold"
requires-python = ">=3.11"
dependencies = [
    "project-core",
    "platform-core",
    "chat-gateway",
    "sql-gateway",
    "python-sandbox",
    "conversational-router",
    "sql-planner",
    "risk-reviewer",
    "data-analyst",
    "pytest>=8",
    "pandas",
    "pyarrow",
    "pyjwt>=2.8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/project_test"]

[tool.pytest.ini_options]
testpaths = ["."]
pythonpath = [".", "../../agents/conversational-router/src", "../../agents/sql-planner/src", "../../agents/risk-reviewer/src", "../../agents/data-analyst/src", "../../agents/chat-gateway/src", "../../mcp-servers/sql-gateway/src", "../../mcp-servers/python-sandbox/src"]
addopts = "-q"
markers = [
    "unit: no network",
    "integration: in-process stubs",
    "live: opt-in tests requiring real SQL or LLM",
]
